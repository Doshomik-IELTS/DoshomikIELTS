name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional image tag override (default: edge)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (app)
        id: meta-app
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=${{ inputs.tag || 'edge' }},enable=true
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-app.outputs.tags }}
          labels: ${{ steps.meta-app.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: runner
          build-args: |
            GIT_SHA=${{ github.sha }}

      - name: Extract Docker metadata (worker)
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-worker
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=${{ inputs.tag || 'edge' }},enable=true

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: runner-worker
          build-args: |
            GIT_SHA=${{ github.sha }}

  deploy:
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deployment trigger placeholder
        run: |
          echo "✅ Images pushed to GHCR:"
          echo "  ghcr.io/${{ github.repository }}:${{ inputs.tag || 'edge' }}"
          echo "  ghcr.io/${{ github.repository }}-worker:${{ inputs.tag || 'edge' }}"
          echo ""
          echo "To deploy:"
          echo "  docker pull ghcr.io/${{ github.repository }}:edge"
          echo "  docker run -p 3000:3000 --env-file .env ghcr.io/${{ github.repository }}:edge"
          echo ""
          echo "To deploy via SSH:"
          echo "  Add an SSH deploy step here using secrets.DEPLOY_HOST, DEPLOY_USER, DEPLOY_KEY"
