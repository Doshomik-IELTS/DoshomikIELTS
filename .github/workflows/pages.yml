# Builds the design prototype as a static site and deploys to GitHub Pages.
# Serves as a quick demo of the landing page at https://nabil0x.github.io/IELTS/
name: Pages

on:
  push:
    branches:
      - main
    paths:
      - "design_X/v1.0.0/E-learning-1.0.0/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design_X/v1.0.0/E-learning-1.0.0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ./design_X/v1.0.0/E-learning-1.0.0/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          REPO_NAME: DoshomikIELTS
          NODE_ENV: production

      - name: Add .nojekyll for _next/ directory
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: design_X/v1.0.0/E-learning-1.0.0/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
